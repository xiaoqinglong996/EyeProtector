name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Make gradlew executable
      run: chmod +x ./gradlew
      
    - name: Validate Gradle Wrapper
      run: |
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Downloading missing gradle-wrapper.jar..."
          mkdir -p gradle/wrapper
          wget https://github.com/gradle/gradle/releases/download/v8.5/gradle-8.5-bin.zip
          unzip -j gradle-8.5-bin.zip 'gradle-8.5/lib/gradle-wrapper.jar' -d gradle/wrapper/
          rm gradle-8.5-bin.zip
        fi
        
    - name: Build with Gradle
      run: |
        # 清除之前的构建缓存
        ./gradlew clean
        # 构建debug版本
        ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: EyeProtector-APK
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/debug/output-metadata.json
        retention-days: 7
        
    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports/
          app/build/outputs/
        retention-days: 7
